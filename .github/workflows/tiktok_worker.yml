name: TikTok Worker

on:
  schedule:
    - cron: '*/8 * * * *'   # cada 8 minutos
  workflow_dispatch:          # permite correrlo manualmente desde GitHub UI

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 6        # muere antes del siguiente ciclo para evitar solapamiento

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase yt-dlp

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python tiktok_worker.py
