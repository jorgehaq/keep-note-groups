name: TikTok Worker

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos (Whisper necesita más tiempo que solo metadata)
  workflow_dispatch:           # trigger manual desde GitHub UI

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 8         # Whisper en CPU para videos cortos tarda ~30-60s por video

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Install Python dependencies
        run: |
          pip install openai-whisper yt-dlp supabase

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python scripts/tiktok_worker.py